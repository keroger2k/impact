<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">II</div>
      <div style="margin-left:12px">
        <div class="login-title">IMPACT II</div>
        <div class="login-subtitle">TSA Network Operations</div>
      </div>
    </div>
    <div class="login-body">
      {% if error %}
      <div class="alert alert-danger alert-sm"><strong>⚠️ Error:</strong> {{ error }}</div>
      {% endif %}
      <form action="/login" method="POST">
        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input name="username" id="username" class="form-control" type="text" placeholder="Enter your username" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input name="password" id="password" class="form-control" type="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Sign In</button>
      </form>
    </div>
  </div>
</div>
