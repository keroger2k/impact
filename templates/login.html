<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — IMPACT II</title>
  <link rel="stylesheet" href="/static/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="bg-navy">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">II</div>
        <div style="margin-left:16px">
          <div class="login-title">IMPACT II</div>
          <div class="login-subtitle">TSA Network Operations</div>
        </div>
      </div>
      <div class="login-body">
        {% if error %}
        <div class="alert badge-danger w-100 mb-4 p-3 font-weight-bold" style="border-radius: var(--radius-md)"><strong>⚠️ Error:</strong> {{ error }}</div>
        {% endif %}
        <form action="/login" method="POST">
          <div class="mb-4">
            <label for="username" class="form-label font-weight-bold small text-muted text-uppercase mb-2" style="letter-spacing: 0.05em">Username</label>
            <input name="username" id="username" class="form-control" type="text" placeholder="Enter your username" autocomplete="username" required>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label font-weight-bold small text-muted text-uppercase mb-2" style="letter-spacing: 0.05em">Password</label>
            <input name="password" id="password" class="form-control" type="password" placeholder="Enter your password" autocomplete="current-password" required>
          </div>
          <button type="submit" id="signin-btn" class="btn btn-primary w-100 py-3 font-weight-bold mt-2">Sign In</button>
        </form>
      </div>
    </div>
  </div>
<script>
  document.querySelector('form').addEventListener('submit', function() {
    const btn = document.getElementById('signin-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Authenticating...';
  });
</script>
</body>
</html>
