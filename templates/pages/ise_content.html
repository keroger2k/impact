<div class="row g-4 h-100">
  <div class="col-md-3">
    <div class="card shadow-sm border-0 animate-fade-in h-100">
      <div class="card-header bg-navy text-white d-flex align-items-center gap-2">
        <i class=" ph ph-shield"></i>
        <span class="fw-bold">Cisco ISE Dashboard</span>
      </div>
      <div class="card-body p-0">
        <div class="list-group list-group-flush">
          <button class="list-group-item list-group-item-action active" hx-get="/api/ise/nads" hx-target="#ise-results" hx-indicator="#ise-loading" onclick="this.closest('.list-group').querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active')); this.classList.add('active')">
            🛡️ Network Access Devices
          </button>
          <button class="list-group-item list-group-item-action" hx-get="/api/ise/sgts" hx-target="#ise-results" hx-indicator="#ise-loading" onclick="this.closest('.list-group').querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active')); this.classList.add('active')">
            🏷️ Scalable Group Tags
          </button>
          <button class="list-group-item list-group-item-action" hx-get="/api/ise/policy-sets" hx-target="#ise-results" hx-indicator="#ise-loading" onclick="this.closest('.list-group').querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active')); this.classList.add('active')">
            📜 Policy Sets
          </button>
          <button class="list-group-item list-group-item-action" hx-get="/api/ise/users" hx-target="#ise-results" hx-indicator="#ise-loading" onclick="this.closest('.list-group').querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active')); this.classList.add('active')">
            👤 Internal Users
          </button>
        </div>
        <div class="p-3 bg-light border-top">
           <form hx-get="/api/ise/endpoints" hx-target="#ise-results" hx-indicator="#ise-loading">
            <label class="form-label text-navy fw-bold small uppercase letter-spacing-1">MAC Lookup</label>
            <div class="input-group">
              <input type="text" name="mac" class="form-control" placeholder="00:11:22:33:44:55" required>
              <button class="btn btn-primary btn-sm"><i class=" ph ph-magnifying-glass"></i></button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  <div class="col-md-9 d-flex flex-column">
    <div id="ise-loading" class="htmx-indicator text-center p-5 animate-fade-in">
      <div class="spinner spinner-lg"></div>
      <p class="text-muted small mt-2">Connecting to Cisco ISE and fetching data...</p>
    </div>
    <div id="ise-results" hx-get="/api/ise/nads" hx-trigger="load"></div>
  </div>
</div>
