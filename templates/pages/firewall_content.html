<div class="row g-4 h-100">
  <div class="col-md-3">
    <div class="card shadow-sm border-0 animate-fade-in h-100">
      <div class="card-header bg-navy text-white d-flex align-items-center gap-2">
        <i class=" ph ph-fire"></i>
        <span class="fw-bold">Panorama Firewall Ops</span>
      </div>
      <div class="card-body p-0">
        <div class="list-group list-group-flush">
          <button class="list-group-item list-group-item-action py-3 px-4 active" hx-get="/api/firewall/devices" hx-target="#pan-results" hx-indicator="#pan-loading" onclick="this.closest('.list-group').querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active')); this.classList.add('active')">
            <i class="ph ph-fire me-2"></i> Managed Devices
          </button>
          <button class="list-group-item list-group-item-action py-3 px-4" hx-get="/api/firewall/device-groups" hx-target="#pan-results" hx-indicator="#pan-loading" onclick="this.closest('.list-group').querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active')); this.classList.add('active')">
            <i class="ph ph-tree-structure me-2"></i> Device Groups
          </button>
          <button class="list-group-item list-group-item-action py-3 px-4" hx-get="/api/firewall/interfaces" hx-target="#pan-results" hx-indicator="#pan-loading" onclick="this.closest('.list-group').querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active')); this.classList.add('active')">
            <i class="ph ph-plug me-2"></i> Interface Inventory
          </button>
          <a class="list-group-item list-group-item-action py-3 px-4" href="/api/firewall/rules/export" download>
            <i class="ph ph-download-simple me-2"></i> Export All Rules (Names)
          </a>
          <a class="list-group-item list-group-item-action py-3 px-4" href="/api/firewall/rules/export?expand=true" download>
            <i class="ph ph-download-simple me-2"></i> Export All Rules (Expanded)
          </a>
        </div>
      </div>
    </div>
  </div>
  <div class="col-md-9 d-flex flex-column">
    <div id="pan-loading" class="htmx-indicator text-center p-5">
      <div class="spinner spinner-lg"></div>
      <p class="text-muted small mt-2">Connecting to Panorama and fetching data...</p>
    </div>
    <div id="pan-results" hx-get="/api/firewall/devices" hx-trigger="load" hx-indicator="#pan-loading" class="table-container shadow-md"></div>
  </div>
  </div>

<style>
    .list-group-item {
        border: none;
        font-weight: 500;
        color: var(--text-muted);
        transition: all var(--transition);
        font-size: 13px;
    }
    .list-group-item i { font-size: 1.1rem; vertical-align: middle; }
    .list-group-item:hover { background-color: #F8FAFC; color: var(--accent); }
    .list-group-item.active { background-color: rgba(59, 130, 246, 0.05); color: var(--accent); border-left: 3px solid var(--accent); }
</style>
