<div class="animate-fade-in">
  <div class="row mb-4">
    <div class="col-12">
      <div class="card shadow-sm border-0 bg-navy text-white p-4">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <h3 class="fw-bold mb-1"><i class="fas fa-database me-2"></i> Cache Management</h3>
            <p class="mb-0 opacity-75">Inspect and refresh application cache objects across all systems.</p>
          </div>
          <button class="btn btn-outline-light"
                  hx-post="/api/dnac/cache/refresh"
                  hx-swap="none"
                  hx-on::after-request="if(event.detail.successful) { alert('Full application cache (memory + disk) has been cleared.'); window.location.reload(); }">
            <i class="fas fa-trash-alt me-2"></i> Clear All Cache
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="cache-results" class="mb-4"></div>

  <div class="row g-4" id="cache-cards-container" hx-get="/api/cache/status" hx-trigger="load, every 30s">
    <div class="col-12 text-center p-5">
      <div class="spinner spinner-lg"></div>
      <p class="text-muted mt-3">Loading cache status...</p>
    </div>
  </div>

  <div id="cache-spinner" class="htmx-indicator position-fixed top-50 start-50 translate-middle" style="z-index: 9999;">
    <div class="bg-white p-4 rounded shadow-lg text-center">
        <div class="spinner spinner-lg"></div>
        <p class="text-muted mt-2 fw-bold mb-0">Processing cache operation...</p>
    </div>
  </div>
</div>
