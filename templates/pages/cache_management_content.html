<div class="animate-fade-in">
  <div class="row mb-4">
    <div class="col-12">
      <div class="card shadow-sm border-0 bg-navy text-white p-4">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <h3 class="fw-bold mb-1"><i class=" ph ph-database me-2"></i> Cache Management</h3>
            <p class="mb-0 opacity-75">Inspect and refresh application cache objects across all systems.</p>
          </div>
          <button class="btn btn-outline-light"
                  hx-post="/api/dnac/cache/refresh"
                  hx-swap="none"
                  hx-on::after-request="if(event.detail.successful) { alert('Full application cache (memory + disk) has been cleared.'); window.location.reload(); }">
            <i class=" ph ph-trash me-2"></i> Clear All Cache
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="cache-results" class="mb-4"></div>

  <div class="row g-4" id="cache-cards-container" hx-get="/api/cache/status" hx-trigger="load, every 30s">
    <div class="col-12 text-center p-5">
      <div class="spinner spinner-lg"></div>
      <p class="text-muted mt-3">Loading cache status...</p>
    </div>
  </div>

  <div id="cache-spinner" class="htmx-indicator position-fixed top-50 start-50 translate-middle" style="z-index: 9999;">
    <div class="bg-white p-4 rounded shadow-lg text-center">
        <div class="spinner spinner-lg"></div>
        <p class="text-muted mt-2 fw-bold mb-0">Processing cache operation...</p>
    </div>
  </div>
</div>

<script>
function triggerNexusCacheRefresh() {
  const resultsEl = document.getElementById('cache-results');

  // Extract token from the hx-headers attribute set on <body> by base.html
  let token = '';
  try {
    const hxHeaders = JSON.parse(document.body.getAttribute('hx-headers') || '{}');
    token = (hxHeaders['Authorization'] || '').replace('Bearer ', '');
  } catch (e) {}

  if (resultsEl) {
    resultsEl.innerHTML = `
      <div class="alert alert-info d-flex align-items-center gap-2 mb-0">
        <div class="spinner spinner-sm flex-shrink-0" style="width:1.1rem;height:1.1rem;border-width:2px"></div>
        <span>Connecting to Nexus devices via SSH — this may take several minutes...</span>
      </div>`;
  }

  const logs = [];
  const es = new EventSource('/api/nexus/refresh?token=' + encodeURIComponent(token));

  es.onmessage = function(ev) {
    let data;
    try { data = JSON.parse(ev.data); } catch { return; }

    if (data.type === 'log') {
      logs.push(data);
      if (resultsEl) {
        const logLines = logs.map(l => {
          const cls = l.level === 'error' ? 'text-danger' : l.level === 'success' ? 'text-success' : 'text-muted';
          return `<div class="small ${cls}">${l.message}</div>`;
        }).join('');
        resultsEl.innerHTML = `
          <div class="card p-3">
            <div class="fw-bold small mb-2">Nexus Collection Progress</div>
            <div style="max-height:200px;overflow-y:auto">${logLines}</div>
          </div>`;
      }
    } else if (data.type === 'complete') {
      es.close();
      if (resultsEl) {
        resultsEl.innerHTML = `
          <div class="alert alert-success alert-dismissible fade show mb-0" role="alert">
            <strong>Done!</strong> Nexus SSH collection complete — ${data.count} device(s) collected.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>`;
      }
      htmx.ajax('GET', '/api/cache/status', {target: '#cache-cards-container', swap: 'innerHTML'});
    }
  };

  es.onerror = function() {
    es.close();
    if (resultsEl) {
      resultsEl.innerHTML = `
        <div class="alert alert-danger alert-dismissible fade show mb-0" role="alert">
          <strong>Error:</strong> Nexus refresh failed or the connection was closed. Check server logs.
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>`;
    }
  };
}
</script>
