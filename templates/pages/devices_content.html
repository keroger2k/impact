<div class="dev-split-container">

  <!-- ── Left: Inventory Table Section ────────── -->
  <div class="dev-inventory-side">
    <div class="card shadow-md h-100 d-flex flex-column mb-0">
      <div class="card-header flex-between flex-shrink-0">
        <div class="d-flex align-items-center gap-2">
          <i class="ph ph-list-bullets text-primary" style="font-size: 1.2rem"></i>
          <span class="font-weight-bold">Network Inventory</span>
          <span id="dev-count-badge" class="badge badge-muted ms-2">...</span>
        </div>
        <div class="d-flex gap-2">
          <div class="position-relative">
            <label for="dev-table-filter" class="visually-hidden">Filter devices</label>
            <span class="position-absolute top-50 start-0 translate-middle-y ps-3 text-muted" style="font-size: 0.9rem">
              <i class="ph ph-magnifying-glass"></i>
            </span>
            <input type="text" id="dev-table-filter" class="form-control ps-5 py-1" style="font-size: 13px; width: 200px;" placeholder="Search..." onkeyup="filterDevices()">
          </div>

          <div class="dropdown">
            <button class="btn btn-outline btn-xs px-3" type="button" data-bs-toggle="dropdown">
              <i class="ph ph-arrows-clockwise"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow-md border-0">
              <li><a class="dropdown-item py-2" href="#" onclick="refreshLocalInventory()"><i class="ph ph-cloud-arrow-down me-2 text-primary"></i>DNAC Sync</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item py-2" href="#" onclick="triggerNexusRefresh()"><i class="ph ph-terminal-window me-2 text-success"></i>Nexus SSH</a></li>
            </ul>
          </div>
        </div>
      </div>

      <div class="scroll-area bg-white">
        <table class="table mb-0" id="devices-master-table">
          <thead>
            <tr>
              <th onclick="sortDevices('hostname')" class="cursor-pointer">Hostname</th>
              <th onclick="sortDevices('managementIpAddress')" class="cursor-pointer">IP</th>
              <th onclick="sortDevices('platformId')" class="cursor-pointer">Platform</th>
              <th onclick="sortDevices('reachabilityStatus')" class="cursor-pointer">Status</th>
              <th class="text-end"></th>
            </tr>
          </thead>
          <tbody id="dev-table-body">
            <!-- Populated via JS -->
          </tbody>
        </table>
        <div id="dev-master-loading" class="p-5 text-center d-none">
           <div class="spinner-border text-primary spinner-border-sm"></div>
           <p class="text-muted small mt-2">Syncing...</p>
        </div>
      </div>

      <!-- Paging Footer -->
      <div class="bg-light border-top flex-between py-2 px-3 flex-shrink-0">
        <div class="small text-muted" id="paging-info" style="font-size: 11px">0-0 of 0</div>
        <div class="pagination-controls d-flex gap-1">
          <button class="btn btn-outline btn-xs px-1" onclick="prevPage()"><i class="ph ph-caret-left"></i></button>
          <div id="page-numbers" class="d-flex gap-1"></div>
          <button class="btn btn-outline btn-xs px-1" onclick="nextPage()"><i class="ph ph-caret-right"></i></button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Right: Device Details Section ────────────────────────── -->
  <div class="dev-detail-side">
    <div id="dev-detail-panel" class="h-100">
      <div class="detail-panel shadow-md d-flex flex-column justify-content-center align-items-center text-center p-5">
        <div class="text-light mb-3" style="font-size: 3rem; opacity: 0.2;">
            <i class="ph ph-desktop"></i>
        </div>
        <h6 class="font-weight-bold text-navy">No Device Selected</h6>
        <p class="text-muted small">Select a device from the inventory to view real-time telemetry, specifications, and configurations.</p>
      </div>
    </div>

    <div id="dev-detail-loading" class="htmx-indicator detail-panel shadow-md d-flex flex-column justify-content-center align-items-center p-5">
      <div class="spinner-border text-primary mb-3"></div>
      <p class="text-muted small font-weight-bold">Fetching Telemetry...</p>
    </div>
  </div>

</div>

<script>
  var ALL_DEVICES = {{ initial_devices | tojson | safe }};
  var FILTERED_DEVICES = [...ALL_DEVICES];
  var CURRENT_PAGE = 1;
  var PAGE_SIZE = 40;
  var SORT_COL = 'hostname';
  var SORT_DIR = 1;

  async function loadInitialDevices() {
    if (Array.isArray(ALL_DEVICES) && ALL_DEVICES.length > 0) {
        document.getElementById('dev-count-badge').textContent = ALL_DEVICES.length;
        renderTable();
        return;
    }

    const loader = document.getElementById('dev-master-loading');
    loader.classList.remove('d-none');

    try {
      const res = await fetch('/api/dnac/devices?limit=5000', {
        headers: { 'Accept': 'application/json' }
      });
      const data = await res.json();

      // Handle both flat list and wrapped object for robustness
      ALL_DEVICES = Array.isArray(data) ? data : (data.items || []);
      FILTERED_DEVICES = [...ALL_DEVICES];

      document.getElementById('dev-count-badge').textContent = ALL_DEVICES.length;
      renderTable();
    } catch (e) {
      console.error("Failed to load inventory:", e);
    } finally {
      loader.classList.add('d-none');
    }
  }

  function filterDevices() {
    const term = document.getElementById('dev-table-filter').value.toLowerCase();
    FILTERED_DEVICES = ALL_DEVICES.filter(d => {
        return (d.hostname || '').toLowerCase().includes(term) ||
               (d.managementIpAddress || '').toLowerCase().includes(term) ||
               (d.platformId || '').toLowerCase().includes(term);
    });
    CURRENT_PAGE = 1;
    renderTable();
  }

  function sortDevices(col) {
    if (SORT_COL === col) SORT_DIR *= -1;
    else { SORT_COL = col; SORT_DIR = 1; }

    FILTERED_DEVICES.sort((a, b) => {
        const valA = (a[col] || '').toString().toLowerCase();
        const valB = (b[col] || '').toString().toLowerCase();
        return valA < valB ? -1 * SORT_DIR : (valA > valB ? 1 * SORT_DIR : 0);
    });
    renderTable();
  }

  function renderTable() {
    const tbody = document.getElementById('dev-table-body');
    const start = (CURRENT_PAGE - 1) * PAGE_SIZE;
    const end = start + PAGE_SIZE;
    const pageData = FILTERED_DEVICES.slice(start, end);

    tbody.innerHTML = pageData.map(d => `
      <tr class="clickable-row" onclick="selectDevice('${d.id}', this)">
        <td class="font-weight-bold small text-navy">${d.hostname}</td>
        <td class="mono small text-muted">${d.managementIpAddress}</td>
        <td class="small text-muted">${d.platformId}</td>
        <td>
           <span class="status-pip ${d.reachabilityStatus === 'Reachable' ? 'online' : 'offline'}" aria-label="${d.reachabilityStatus}" title="${d.reachabilityStatus}"></span>
        </td>
        <td class="text-end">
            <i class="ph ph-caret-right text-light small"></i>
        </td>
      </tr>
    `).join('');

    updatePaging(start, end);
  }

  function updatePaging(start, end) {
    const total = FILTERED_DEVICES.length;
    const actualEnd = Math.min(end, total);
    document.getElementById('paging-info').textContent = `${total > 0 ? start + 1 : 0}-${actualEnd} of ${total}`;

    const pageCount = Math.ceil(total / PAGE_SIZE);
    const container = document.getElementById('page-numbers');
    container.innerHTML = '';

    const maxBtns = 3;
    let startPage = Math.max(1, CURRENT_PAGE - 1);
    let endPage = Math.min(pageCount, startPage + maxBtns - 1);

    for (let i = startPage; i <= endPage; i++) {
        const btn = document.createElement('button');
        btn.className = `btn btn-xs ${i === CURRENT_PAGE ? 'btn-primary' : 'btn-outline'} px-2`;
        btn.textContent = i;
        btn.onclick = () => { CURRENT_PAGE = i; renderTable(); };
        container.appendChild(btn);
    }
  }

  function prevPage() { if (CURRENT_PAGE > 1) { CURRENT_PAGE--; renderTable(); } }
  function nextPage() { if (CURRENT_PAGE * PAGE_SIZE < FILTERED_DEVICES.length) { CURRENT_PAGE++; renderTable(); } }

  function selectDevice(id, rowEl) {
    document.querySelectorAll('.clickable-row').forEach(el => el.classList.remove('active-row'));
    rowEl.classList.add('active-row');

    htmx.ajax('GET', '/api/dnac/devices/' + id + '/detail', {
        target: '#dev-detail-panel',
        indicator: '#dev-detail-loading'
    });
  }

  function refreshLocalInventory() { loadInitialDevices(); }

  function triggerNexusRefresh() {
    const loader = document.getElementById('dev-master-loading');
    loader.classList.remove('d-none');


    const eventSource = new EventSource('/api/nexus/refresh', { withCredentials: true });
    const cleanup = () => { eventSource.close(); };
    window.addEventListener('hashchange', cleanup, { once: true });
    window.addEventListener('popstate', cleanup, { once: true });

    eventSource.onmessage = function(event) {
        const data = JSON.parse(event.data);
        if (data.type === 'log') {
            console.log("Nexus Refresh: " + data.message);
        } else if (data.type === 'complete') {
            eventSource.close();
            loader.classList.add('d-none');
            alert('Nexus data collection complete: ' + data.count + ' devices.');
            refreshLocalInventory();
        }
    };

    eventSource.onerror = function() {
        eventSource.close();
        loader.classList.add('d-none');
        alert("Nexus refresh failed. Check your connection or credentials.");
    };
  }

  loadInitialDevices();
</script>

<style>
  .clickable-row { cursor: pointer; transition: background-color var(--transition); }
  .clickable-row:hover { background-color: #F8FAFC; }
  .active-row { background-color: #EFF6FF !important; border-left: 3px solid var(--accent); }
  .active-row td { color: var(--accent) !important; }
</style>
