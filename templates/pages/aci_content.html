<div class="row g-4 h-100">
  <div class="col-md-3">
    <div class="card shadow-md border-0 animate-fade-in h-100">
      <div class="card-header flex-between">
        <div class="d-flex align-items-center gap-2">
            <i class="ph ph-buildings text-primary"></i>
            <span class="font-weight-bold">Cisco ACI Dashboard</span>
        </div>
      </div>
      <div class="card-body p-0">
        <div class="list-group list-group-flush">
          <button class="list-group-item list-group-item-action py-3 px-4 active" hx-get="/api/aci/fabric/nodes" hx-target="#aci-results" hx-indicator="#aci-loading" onclick="this.closest('.list-group').querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active')); this.classList.add('active')">
            <i class="ph ph-hard-drives me-2"></i> Fabric Nodes
          </button>
          <button class="list-group-item list-group-item-action py-3 px-4" hx-get="/api/aci/l3outs" hx-target="#aci-results" hx-indicator="#aci-loading" onclick="this.closest('.list-group').querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active')); this.classList.add('active')">
            <i class="ph ph-globe-hemisphere-east me-2"></i> L3Out Visibility
          </button>
          <button class="list-group-item list-group-item-action py-3 px-4" hx-get="/api/aci/bgp/peers" hx-target="#aci-results" hx-indicator="#aci-loading" onclick="this.closest('.list-group').querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active')); this.classList.add('active')">
            <i class="ph ph-plug-connect me-2"></i> BGP Peers
          </button>
          <button class="list-group-item list-group-item-action py-3 px-4" hx-get="/api/aci/bgp/advertised" hx-target="#aci-results" hx-indicator="#aci-loading" onclick="this.closest('.list-group').querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active')); this.classList.add('active')">
            <i class="ph ph-arrow-up-right me-2"></i> Advertised Routes (TX)
          </button>
          <button class="list-group-item list-group-item-action py-3 px-4" hx-get="/api/aci/bgp/received" hx-target="#aci-results" hx-indicator="#aci-loading" onclick="this.closest('.list-group').querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active')); this.classList.add('active')">
            <i class="ph ph-arrow-down-left me-2"></i> Received Routes (RX)
          </button>
          <button class="list-group-item list-group-item-action py-3 px-4" hx-get="/api/aci/traffic/epgs" hx-target="#aci-results" hx-indicator="#aci-loading" onclick="this.closest('.list-group').querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active')); this.classList.add('active')">
            <i class="ph ph-chart-line-up me-2"></i> Traffic Analysis (EPGs)
          </button>
          <button class="list-group-item list-group-item-action py-3 px-4" hx-get="/api/aci/traffic/faults" hx-target="#aci-results" hx-indicator="#aci-loading" onclick="this.closest('.list-group').querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active')); this.classList.add('active')">
            <i class="ph ph-warning-circle me-2"></i> Operational Faults
          </button>
        </div>
      </div>
    </div>
  </div>
  <div class="col-md-9 d-flex flex-column position-relative">
    <div id="aci-loading" class="htmx-indicator position-absolute top-0 start-0 w-100 h-100 bg-white bg-opacity-75 animate-fade-in" style="z-index: 100;">
      <div class="d-flex flex-column align-items-center justify-content-center h-100">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
        <p class="text-main font-weight-bold mt-3">Syncing with APIC Fabric...</p>
      </div>
    </div>
    <div id="aci-results" hx-get="/api/aci/fabric/nodes" hx-trigger="load once" hx-indicator="#aci-loading" style="min-height: 600px;" class="table-container shadow-md"></div>
  </div>
</div>

<style>
    .list-group-item {
        border: none;
        font-weight: 500;
        color: var(--text-muted);
        transition: all var(--transition);
        font-size: 13px;
    }
    .list-group-item i { font-size: 1.1rem; vertical-align: middle; }
    .list-group-item:hover { background-color: #F8FAFC; color: var(--accent); }
    .list-group-item.active { background-color: rgba(59, 130, 246, 0.05); color: var(--accent); border-left: 3px solid var(--accent); }
</style>
