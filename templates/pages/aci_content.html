<div class="row g-4 h-100">
  <div class="col-md-3">
    <div class="card shadow-md border-0 animate-fade-in h-100">
      <div class="card-header bg-white border-bottom py-3">
        <div class="d-flex align-items-center gap-2 mb-3">
            <i class="ph ph-buildings text-primary"></i>
            <span class="fw-bold text-navy">Cisco ACI Dashboard</span>
        </div>

        <!-- Fabric Selector -->
        <div class="fabric-selector-container">
            <label class="small text-muted fw-bold mb-1 d-block">ACTIVE FABRIC</label>
            <div class="input-group input-group-sm">
                <span class="input-group-text bg-light border-end-0"><i class="ph ph-intersect"></i></span>
                <select id="aci-fabric-select" class="form-select border-start-0 ps-0" onchange="switchFabric(this.value)">
                    <!-- Populated via script -->
                </select>
            </div>
        </div>
      </div>
      <div class="card-body p-0">
        <div class="list-group list-group-flush">
          <button class="list-group-item list-group-item-action py-3 px-4 active" hx-get="/api/aci/fabric/nodes" hx-vals='js:{fabric: window.currentFabric}' hx-target="#aci-results" hx-indicator="#aci-loading" onclick="this.closest('.list-group').querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active')); this.classList.add('active')">
            <i class="ph ph-hard-drives me-2"></i> Fabric Nodes
          </button>
          <button class="list-group-item list-group-item-action py-3 px-4" hx-get="/api/aci/l3outs" hx-vals='js:{fabric: window.currentFabric}' hx-target="#aci-results" hx-indicator="#aci-loading" onclick="this.closest('.list-group').querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active')); this.classList.add('active')">
            <i class="ph ph-globe-hemisphere-east me-2"></i> L3Out Visibility
          </button>
          <button class="list-group-item list-group-item-action py-3 px-4" hx-get="/api/aci/bgp/peers" hx-vals='js:{fabric: window.currentFabric}' hx-target="#aci-results" hx-indicator="#aci-loading" onclick="this.closest('.list-group').querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active')); this.classList.add('active')">
            <i class="ph ph-plugs-connected me-2"></i> BGP Peers
          </button>
          <button class="list-group-item list-group-item-action py-3 px-4" hx-get="/api/aci/traffic/epgs" hx-vals='js:{fabric: window.currentFabric}' hx-target="#aci-results" hx-indicator="#aci-loading" onclick="this.closest('.list-group').querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active')); this.classList.add('active')">
            <i class="ph ph-chart-line-up me-2"></i> Traffic Analysis (EPGs)
          </button>
          <button class="list-group-item list-group-item-action py-3 px-4" hx-get="/api/aci/traffic/faults" hx-vals='js:{fabric: window.currentFabric}' hx-target="#aci-results" hx-indicator="#aci-loading" onclick="this.closest('.list-group').querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active')); this.classList.add('active')">
            <i class="ph ph-warning-circle me-2"></i> Operational Faults
          </button>
        </div>
      </div>
    </div>
  </div>
  <div class="col-md-9 d-flex flex-column position-relative">
    <div id="aci-loading" class="htmx-indicator position-absolute top-0 start-0 w-100 h-100 bg-white bg-opacity-75" style="z-index: 100; pointer-events: none;">
      <div class="d-flex flex-column align-items-center justify-content-center h-100">
        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
        <p class="text-main font-weight-bold mt-3">Syncing with APIC Fabric...</p>
      </div>
    </div>
    <div id="aci-results" hx-get="/api/aci/fabric/nodes" hx-trigger="load once" hx-indicator="#aci-loading" style="min-height: 600px;" class="table-container shadow-md"></div>
  </div>
</div>

<script>
    // Fabric management
    (function initFabricSelector() {
        const select = document.getElementById('aci-fabric-select');
        const cookieFabric = document.cookie.split('; ').find(row => row.startsWith('impact_aci_fabric='))?.split('=')[1];

        fetch('/api/aci/fabrics')
            .then(r => r.json())
            .then(fabrics => {
                if (!fabrics || fabrics.length === 0) return;
                let options = fabrics.map(f => `<option value="${f.id}">${f.label}</option>`).join('');
                options += '<option value="all">All Fabrics (Aggregated)</option>';
                select.innerHTML = options;

                window.currentFabric = cookieFabric || fabrics[0].id;
                select.value = window.currentFabric;

                // If it's the first load and we have no result yet, trigger the active button
                const results = document.getElementById('aci-results');
                if (!results.innerHTML.trim()) {
                    htmx.trigger('.list-group-item.active', 'click');
                }
            });
    })();

    window.switchFabric = function(fid) {
        window.currentFabric = fid;
        document.cookie = `impact_aci_fabric=${fid}; path=/; SameSite=Strict`;

        // Update the dropdown selector if it wasn't the source of the change
        const select = document.getElementById('aci-fabric-select');
        if (select && select.value !== fid) {
            select.value = fid;
        }

        // Re-trigger the active sidebar button
        const activeBtn = document.querySelector('.list-group-item.active');
        if (activeBtn) htmx.trigger(activeBtn, 'click');
    };
</script>

<style>
    .fabric-selector-container .form-select {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--navy);
        background-color: #f8fafc;
        cursor: pointer;
    }
    .fabric-selector-container .form-select:focus {
        border-color: var(--accent);
        box-shadow: none;
    }
    .list-group-item {
        border: none;
        font-weight: 500;
        color: var(--text-muted);
        transition: all var(--transition);
        font-size: 13px;
    }
    .list-group-item i { font-size: 1.1rem; vertical-align: middle; }
    .list-group-item:hover { background-color: #F8FAFC; color: var(--accent); }
    .list-group-item.active { background-color: rgba(59, 130, 246, 0.05); color: var(--accent); border-left: 3px solid var(--accent); }
</style>
