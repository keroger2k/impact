<div class="row g-4 h-100">
  <div class="col-md-3">
    <div class="card shadow-sm border-0 animate-fade-in h-100">
      <div class="card-header bg-navy text-white d-flex align-items-center gap-2">
        <i class="fas fa-network-wired"></i>
        <span class="fw-bold">Cisco ACI Dashboard</span>
      </div>
      <div class="card-body p-0">
        <div class="list-group list-group-flush">
          <button class="list-group-item list-group-item-action active" hx-get="/api/aci/fabric/nodes" hx-target="#aci-results" hx-indicator="#aci-loading" onclick="this.closest('.list-group').querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active')); this.classList.add('active')">
            🏢 Fabric Nodes
          </button>
          <button class="list-group-item list-group-item-action" hx-get="/api/aci/l3outs" hx-target="#aci-results" hx-indicator="#aci-loading" onclick="this.closest('.list-group').querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active')); this.classList.add('active')">
            🌐 L3Out Visibility
          </button>
          <button class="list-group-item list-group-item-action" hx-get="/api/aci/bgp/peers" hx-target="#aci-results" hx-indicator="#aci-loading" onclick="this.closest('.list-group').querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active')); this.classList.add('active')">
            🔌 BGP Troubleshooting
          </button>
          <button class="list-group-item list-group-item-action" hx-get="/api/aci/traffic/epgs" hx-target="#aci-results" hx-indicator="#aci-loading" onclick="this.closest('.list-group').querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active')); this.classList.add('active')">
            📊 Traffic Analysis (EPGs)
          </button>
          <button class="list-group-item list-group-item-action" hx-get="/api/aci/traffic/faults" hx-target="#aci-results" hx-indicator="#aci-loading" onclick="this.closest('.list-group').querySelectorAll('.list-group-item').forEach(el => el.classList.remove('active')); this.classList.add('active')">
            ⚠️ Operational Faults
          </button>
        </div>
      </div>
    </div>
  </div>
  <div class="col-md-9 d-flex flex-column">
    <div id="aci-loading" class="htmx-indicator text-center p-5 animate-fade-in">
      <div class="spinner spinner-lg"></div>
      <p class="text-muted small mt-2">Connecting to Cisco APIC and fetching data...</p>
    </div>
    <div id="aci-results" hx-get="/api/aci/fabric/nodes" hx-trigger="load once"></div>
  </div>
</div>
