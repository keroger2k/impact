<div class="row g-4">
  <div class="col-md-6">
    <div class="card shadow-sm border-0 animate-fade-in">
      <div class="card-header bg-navy text-white d-flex align-items-center gap-2">
        <i class=" ph ph-file-arrow-up"></i>
        <span class="fw-bold">Bulk Device Import</span>
      </div>
      <div class="card-body p-4">
        <p class="text-muted small mb-4">Enter one device per line in <code>site_code,ip_address</code> format.</p>
        <form id="import-form">
          <div class="mb-4">
            <label class="form-label text-navy fw-bold small uppercase letter-spacing-1">Device List (CSV Format)</label>
            <textarea id="import-csv" class="form-control" rows="10" placeholder="TSA-DCA-HQ,10.10.1.1
TSA-LAX-T1,10.30.1.1"></textarea>
          </div>
          <button type="button" onclick="startCsvImport()" class="btn btn-primary w-100 py-3 fw-bold shadow-sm">
            <i class=" ph ph-cloud-arrow-up me-1"></i> Start Import Process
          </button>
        </form>
        <div id="import-status-label" class="text-info small mt-2 fw-bold"></div>
      </div>
    </div>
  </div>

  <div class="col-md-6">
    <div class="card shadow-sm border-0 animate-fade-in">
      <div class="card-header bg-navy text-white d-flex align-items-center gap-2">
        <i class=" ph ph-tags"></i>
        <span class="fw-bold">Bulk Device Tagging</span>
      </div>
      <div class="card-body p-4">
        <p class="text-muted small mb-4">Apply a tag to a list of device IPs in Catalyst Center.</p>
        <form id="tag-form">
          <div class="mb-3">
            <label class="form-label text-navy fw-bold small uppercase letter-spacing-1">Tag Name</label>
            <input type="text" id="tag-name" class="form-control" placeholder="e.g. Critical-Infrastructure" required>
          </div>
          <div class="mb-4">
            <label class="form-label text-navy fw-bold small uppercase letter-spacing-1">Device IPs</label>
            <textarea id="tag-ips" class="form-control" rows="5" placeholder="10.10.1.1
10.30.1.1" required></textarea>
          </div>
          <button type="button" onclick="startTagging()" class="btn btn-primary w-100 py-3 fw-bold shadow-sm">
            <i class=" ph ph-tag me-1"></i> Apply Tags
          </button>
        </form>
        <div id="tag-status-label" class="text-info small mt-2 fw-bold"></div>
      </div>
    </div>
  </div>

  <div class="col-md-12">
    <div id="import-log" class="bg-dark text-success p-4 rounded shadow-sm overflow-auto d-none" style="max-height: 400px; font-family: 'SF Mono', monospace; font-size: 12px;"></div>
    <div id="import-results" class="mt-4"></div>
  </div>
</div>

<script>
  function startCsvImport() {
    const csv = document.getElementById('import-csv').value;
    const lines = csv.split('\n').map(l => l.trim()).filter(l => l.includes(','));
    const entries = lines.map(l => {
        const parts = l.split(',');
        return { site_code: parts[0].trim(), ip: parts[1].trim() };
    });

    if (entries.length === 0) {
      alert("Invalid format. Use site,ip (one per line).");
      return;
    }

    executeImport({ entries: entries });
  }

  function startTagging() {
    const tagName = document.getElementById('tag-name').value;
    const ips = document.getElementById('tag-ips').value.split('\n').map(i => i.trim()).filter(i => i.length > 0);

    if (!tagName || ips.length === 0) {
      alert("Please enter a tag name and at least one IP.");
      return;
    }

    const log = document.getElementById('import-log');
    log.classList.remove('d-none');
    log.innerHTML = '>> Initializing tagging session for ' + tagName + '...<br>';

    const csrfToken = document.cookie.split('; ').find(row => row.startsWith('csrf_token='));
    const csrfHeader = csrfToken ? csrfToken.split('=')[1] : '';

    fetch('/api/dnac/tag-devices', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRF-Token': csrfHeader
      },
      body: JSON.stringify({ tag_name: tagName, ips: ips })
    }).then(response => {
       const reader = response.body.getReader();
       const decoder = new TextDecoder();
       function process({ done, value }) {
         if (done) return;
         const chunk = decoder.decode(value);
         chunk.split('\n').forEach(line => {
           if (line.startsWith('data: ')) {
             try {
               const data = JSON.parse(line.substring(6));
               if (data.type === 'log') {
                 log.innerHTML += `[${data.level.toUpperCase()}] ${data.message}<br>`;
                 log.scrollTop = log.scrollHeight;
               } else if (data.type === 'complete') {
                 log.innerHTML += `<div class="mt-2 text-info fw-bold">>> Tagging complete. Tagged: ${data.tagged}, Skipped: ${data.skipped}</div>`;
               }
             } catch(e) {}
           }
         });
         return reader.read().then(process);
       }
       return reader.read().then(process);
    });
  }

  function executeImport(payload) {
    const log = document.getElementById('import-log');
    const results = document.getElementById('import-results');
    const status = document.getElementById('import-status-label');

    log.classList.remove('d-none');
    log.innerHTML = '>> Starting import session...<br>';
    results.innerHTML = '';
    status.textContent = 'Status: Initializing...';

    const csrfToken = document.cookie.split('; ').find(row => row.startsWith('csrf_token='));
    const csrfHeader = csrfToken ? csrfToken.split('=')[1] : '';

    fetch('/api/import/run', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRF-Token': csrfHeader
      },
      body: JSON.stringify(payload)
    }).then(response => {
       const reader = response.body.getReader();
       const decoder = new TextDecoder();
       function process({ done, value }) {
         if (done) return;
         const chunk = decoder.decode(value);
         chunk.split('\n').forEach(line => {
           if (line.startsWith('data: ')) {
             try {
               const data = JSON.parse(line.substring(6));
               if (data.type === 'log') {
                 const color = data.level === 'error' ? 'text-danger' : (data.level === 'success' ? 'text-primary' : 'text-success');
                 log.innerHTML += `<span class="${color}">[${data.level.toUpperCase()}] ${data.message}</span><br>`;
                 log.scrollTop = log.scrollHeight;
               } else if (data.type === 'progress') {
                 status.textContent = `Status: Working (${data.done}/${data.total})`;
               } else if (data.type === 'complete') {
                  status.textContent = 'Status: Complete';
                  results.innerHTML = '<div class="card shadow-sm border-start border-4 border-success animate-fade-in"><div class="card-body"><h6 class="fw-bold text-navy mb-3">Import Complete</h6><p class="small text-muted">Discovered: ' + data.discovered + ' | Skipped: ' + data.skipped + ' | Failed: ' + data.failed + '</p></div></div>';
               }
             } catch(e) {}
           }
         });
         return reader.read().then(process);
       }
       return reader.read().then(process);
    });
  }
</script>
