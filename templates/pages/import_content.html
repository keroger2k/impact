<div class="row g-4 justify-content-center">
  <div class="col-md-8">
    <div class="card shadow-sm border-0 animate-fade-in">
      <div class="card-header bg-navy text-white d-flex align-items-center gap-2">
        <i class="fas fa-file-import"></i>
        <span class="fw-bold">Inventory Import Tool</span>
      </div>
      <div class="card-body p-4">
        <p class="text-muted small mb-4">Upload a CSV or Excel file to bulk import devices into the Catalyst Center and Panorama inventory. Our tool will automatically resolve sites and push the initial configuration.</p>
        <form hx-post="/api/import/bulk" hx-encoding="multipart/form-data" hx-target="#import-results" hx-indicator="#import-loading">
          <div class="mb-4">
            <label class="form-label text-navy fw-bold small uppercase letter-spacing-1">Inventory File</label>
            <div class="input-group">
              <input type="file" name="file" class="form-control" accept=".csv,.xlsx" required>
              <span class="input-group-text bg-white"><i class="fas fa-file-csv text-muted"></i></span>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label text-navy fw-bold small uppercase letter-spacing-1">Import Mode</label>
            <div class="form-check mb-2">
              <input class="form-check-input" type="radio" name="mode" value="dry-run" id="dry-run" checked>
              <label class="form-check-label small" for="dry-run">
                <strong>Dry Run</strong> (Verify inventory and sites, no changes)
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="mode" value="commit" id="commit">
              <label class="form-check-label small" for="commit">
                <strong>Commit Changes</strong> (Import and provision devices)
              </label>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow-sm">
            <i class="fas fa-cloud-upload-alt me-1"></i> Start Import Process
          </button>
        </form>
        <div id="import-loading" class="htmx-indicator mt-4 text-center">
          <div class="spinner spinner-md"></div>
          <p class="text-muted small mt-2">Processing inventory file and validating with systems...</p>
        </div>
      </div>
    </div>
    <div id="import-results" class="mt-4"></div>
  </div>
</div>
