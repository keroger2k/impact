<div class="row g-4 justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm border-0 animate-fade-in">
      <div class="card-header bg-navy text-white d-flex align-items-center gap-2">
        <i class=" ph ph-magnifying-glass"></i>
        <span class="fw-bold">Global IP Lookup</span>
      </div>
      <div class="card-body p-4">
        <p class="text-muted small mb-4">Find exactly which device and interface owns an IP address across the entire TSA inventory.</p>
        <form hx-get="/api/dnac/ip-lookup/ui" hx-target="#lookup-results" hx-indicator="#lookup-loading">
          <div class="mb-4">
            <label class="form-label text-navy fw-bold small uppercase letter-spacing-1">IP Address</label>
            <div class="input-group">
              <input type="text" name="ip" class="form-control" placeholder="e.g. 10.1.1.1" required>
              <button class="btn btn-primary"><i class=" ph ph-magnifying-glass"></i></button>
            </div>
          </div>
        </form>
        <div id="lookup-loading" class="htmx-indicator text-center">
          <div class="spinner spinner-md"></div>
          <p class="text-muted small mt-2">Searching DNAC and Panorama caches...</p>
        </div>
      </div>
    </div>
    <div id="lookup-results" class="mt-4"></div>
  </div>
</div>
