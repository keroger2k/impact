<div class="animate-fade-in">
  <div class="flex-between mb-4">
    <div>
      <h4 class="mb-1 font-weight-bold" style="color: var(--sidebar-bg)">Network Hierarchy Engine</h4>
      <p class="text-muted small mb-0">Aggregated visibility across ACI, DNAC, Panorama, and Nexus</p>
    </div>
    <div class="d-flex gap-2">
      <div class="btn-group shadow-sm">
        <button class="btn btn-outline px-3" onclick="expandAllNodes(true)" title="Expand All"><i class="ph ph-folders"></i></button>
        <button class="btn btn-outline px-3" onclick="expandAllNodes(false)" title="Collapse All"><i class="ph ph-folder"></i></button>
      </div>
      <div class="dropdown">
        <button class="btn btn-outline dropdown-toggle" type="button" data-bs-toggle="dropdown">
          <i class="ph ph-arrows-clockwise me-1"></i> Refresh Discovery
        </button>
        <ul class="dropdown-menu dropdown-menu-end shadow-md border-0">
          <li><a class="dropdown-item" href="#" onclick="runRefresh()">Refresh All</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item" href="#" onclick="runRefresh('aci')">Refresh ACI Only</a></li>
          <li><a class="dropdown-item" href="#" onclick="runRefresh('dnac')">Refresh DNAC Only</a></li>
          <li><a class="dropdown-item" href="#" onclick="runRefresh('nexus')">Refresh Nexus Only</a></li>
          <li><a class="dropdown-item" href="#" onclick="runRefresh('panorama')">Refresh Panorama Only</a></li>
        </ul>
      </div>
      <a href="/api/ipam/export" class="btn btn-primary">
        <i class="ph ph-file-csv me-1"></i> Export SolarWinds CSV
      </a>
    </div>
  </div>

  <div class="row mb-4">
    <div class="col-md-6">
        <div class="position-relative">
            <span class="position-absolute top-50 start-0 translate-middle-y ps-3 text-muted">
                <i class="ph ph-magnifying-glass"></i>
            </span>
            <input type="text" id="ipam-filter" class="form-control ps-5" placeholder="Filter by CIDR, Site, or Device..." onkeyup="filterIPAMTree()">
        </div>
    </div>
  </div>

  <div id="ipam-refresh-overlay" class="d-none">
    <div class="card shadow-md border-0 mb-4 bg-white">
        <div class="card-body">
            <div class="d-flex align-items-center gap-3 mb-3">
                <div class="spinner-border spinner-border-sm text-primary"></div>
                <h6 class="mb-0 font-weight-bold">Discovery in Progress...</h6>
                <button class="btn btn-xs btn-outline ms-auto" onclick="closeRefreshOverlay()">Close Log</button>
            </div>
            <div id="ipam-refresh-log" class="bg-dark text-success p-3 rounded-md small font-monospace" style="height: 150px; overflow-y: auto;">
                <!-- Streaming logs here -->
            </div>
        </div>
    </div>
  </div>

  <div id="ipam-results" hx-get="/api/ipam/tree" hx-trigger="load" hx-target="this" class="table-container shadow-md">
    <!-- Tree will be rendered here by JS -->
    <div class="text-center my-5 py-5">
        <i class="ph ph-network ph-3x text-light mb-3" style="font-size: 3rem; opacity: 0.2"></i>
        <p class="text-muted">Loading hierarchical IPAM view...</p>
    </div>
  </div>
</div>

<script>
    function runRefresh(source = null) {
        const overlay = document.getElementById('ipam-refresh-overlay');
        const log = document.getElementById('ipam-refresh-log');
        overlay.classList.remove('d-none');
        log.innerHTML = '';

        let url = '/api/ipam/refresh';
        if (source) url += `?sources=${source}`;

        const eventSource = new EventSource(url);

        eventSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            const line = document.createElement('div');
            line.className = 'mb-1';
            line.textContent = `> ${data.message}`;
            log.appendChild(line);
            log.scrollTop = log.scrollHeight;

            if (data.type === 'complete') {
                eventSource.close();
                htmx.trigger('#ipam-results', 'load');
                setTimeout(() => {
                    const status = document.createElement('div');
                    status.className = 'mt-2 text-info fw-bold';
                    status.textContent = '--- TREE REGENERATED ---';
                    log.appendChild(status);
                    log.scrollTop = log.scrollHeight;
                }, 500);
            }
        };

        eventSource.onerror = function() {
            const err = document.createElement('div');
            err.className = 'text-danger fw-bold mt-1';
            err.textContent = '!! Connection lost or error occurred.';
            log.appendChild(err);
            eventSource.close();
        };
    }

    function closeRefreshOverlay() {
        document.getElementById('ipam-refresh-overlay').classList.add('d-none');
    }

    document.body.addEventListener('htmx:afterOnLoad', function(evt) {
        if (evt.detail.target.id === 'ipam-results') {
            try {
                const data = JSON.parse(evt.detail.xhr.responseText);
                renderIPAMTree(data);
            } catch (e) {
                console.error("Failed to parse IPAM tree data", e);
            }
        }
    });

    let currentIPAMData = null;

    function renderIPAMTree(data) {
        currentIPAMData = data;
        const container = document.getElementById('ipam-results');
        container.innerHTML = '';

        const v4Card = createTreeCard("Global IPv4 Space (RFC1918 & Public)", data.ipv4);
        const v6Card = createTreeCard("Global IPv6 Space (ULA & Public)", data.ipv6);

        container.appendChild(v4Card);
        container.appendChild(v6Card);
    }

    function filterIPAMTree() {
        if (!currentIPAMData) return;
        const query = document.getElementById('ipam-filter').value.toLowerCase();

        const filteredData = {
            ipv4: filterNodes(currentIPAMData.ipv4, query),
            ipv6: filterNodes(currentIPAMData.ipv6, query)
        };

        const container = document.getElementById('ipam-results');
        container.innerHTML = '';
        container.appendChild(createTreeCard("Global IPv4 Space (RFC1918 & Public)", filteredData.ipv4));
        container.appendChild(createTreeCard("Global IPv6 Space (ULA & Public)", filteredData.ipv6));
    }

    function filterNodes(nodes, query) {
        if (!query) return nodes;
        return nodes.map(n => {
            const matchSelf = n.cidr.toLowerCase().includes(query) ||
                             n.site.toLowerCase().includes(query) ||
                             n.device.toLowerCase().includes(query) ||
                             n.display_name.toLowerCase().includes(query);

            const filteredChildren = filterNodes(n.children, query);
            if (matchSelf || filteredChildren.length > 0) {
                return { ...n, children: filteredChildren, _match: true };
            }
            return null;
        }).filter(n => n !== null);
    }

    function expandAllNodes(expand = true) {
        document.querySelectorAll('.sub-nodes').forEach(el => {
            const item = el.closest('.ipam-node-item');
            const icon = item.querySelector('.toggle-icon i');

            if (expand) {
                el.classList.remove('d-none');
                if (icon) icon.className = 'ph ph-caret-down';
            } else {
                el.classList.add('d-none');
                if (icon) icon.className = 'ph ph-caret-right';
            }
        });
    }

    function createTreeCard(title, nodes) {
        const card = document.createElement('div');
        card.className = 'mb-0';

        const header = document.createElement('div');
        header.className = 'bg-light py-3 px-4 fw-bold small text-uppercase letter-spacing-05 border-bottom';
        header.style.color = 'var(--text-muted)';
        header.innerHTML = `<i class="ph ph-tree-structure me-2"></i>${title}`;
        card.appendChild(header);

        const body = document.createElement('div');
        body.className = 'p-0';

        if (!nodes || nodes.length === 0) {
            body.innerHTML = '<div class="p-5 text-center text-muted">No data discovered in this space.</div>';
        } else {
            const list = document.createElement('div');
            nodes.forEach(node => {
                list.appendChild(createNodeElement(node));
            });
            body.appendChild(list);
        }

        card.appendChild(body);
        return card;
    }

    function createNodeElement(node, depth = 0) {
        const item = document.createElement('div');
        item.className = 'ipam-node-item';

        const content = document.createElement('div');
        content.className = 'd-flex align-items-center justify-content-between py-3 px-4 cursor-pointer border-bottom hover-bg';
        content.style.paddingLeft = (depth * 2 + 1.5) + 'rem';

        const hasChildren = node.children && node.children.length > 0;

        if (hasChildren) {
            content.onclick = (e) => {
                const sub = item.querySelector('.sub-nodes');
                const icon = item.querySelector('.toggle-icon i');
                const isCollapsed = sub.classList.contains('d-none');

                if (isCollapsed) {
                    sub.classList.remove('d-none');
                    if (icon) icon.className = 'ph ph-caret-down';
                } else {
                    sub.classList.add('d-none');
                    if (icon) icon.className = 'ph ph-caret-right';
                }
            };
        }

        // Left side: Icon + Name + CIDR
        const left = document.createElement('div');
        left.className = 'd-flex align-items-center gap-3';

        const toggle = document.createElement('span');
        toggle.className = 'text-muted toggle-icon';
        toggle.style.width = '20px';
        toggle.style.display = 'inline-flex';
        toggle.style.justifyContent = 'center';
        if (hasChildren) {
            toggle.innerHTML = '<i class="ph ph-caret-right"></i>';
        }

        const icon = document.createElement('span');
        icon.className = 'me-1';
        if (node.type === 'Group' || node.type === 'Supernet') {
            icon.innerHTML = '<i class="ph ph-folder text-muted"></i>';
        } else {
            icon.innerHTML = '<i class="ph ph-hash text-muted" style="font-size: 0.85rem"></i>';
        }

        const info = document.createElement('div');
        let labelClass = "badge badge-muted ms-2";
        let labelText = node.display_name || 'System-Generated';

        info.innerHTML = `
            <div class="d-flex align-items-center">
                <span class="font-weight-bold" style="color: var(--sidebar-bg)">${node.cidr}</span>
                <span class="${labelClass}">${labelText}</span>
            </div>
        `;

        if (node.conflicts.length > 0) {
            info.innerHTML += `<div class="text-danger small mt-1 font-weight-bold">⚠️ ${node.conflicts.join('<br>⚠️ ')}</div>`;
        }
        if (node.overlaps.length > 0) {
            info.innerHTML += `<div class="text-warning small mt-1">📝 ${node.overlaps.join('<br>📝 ')}</div>`;
        }

        left.appendChild(toggle);
        left.appendChild(icon);
        left.appendChild(info);

        // Right side: Metadata + Actions
        const right = document.createElement('div');
        right.className = 'd-flex align-items-center gap-2';

        if (node.site && node.site !== 'Unknown' && node.site !== '' && node.site !== 'N/A') {
            right.innerHTML += `<span class="badge badge-info">${node.site}</span>`;
        }

        if (node.device && node.device !== 'Unknown' && node.device !== '' && node.device !== 'N/A') {
            right.innerHTML += `<span class="badge badge-muted">${node.device}</span>`;
        }

        if (node.source && node.source !== 'Unknown') {
            right.innerHTML += `<span class="badge badge-muted" style="background: #F8FAFC">${node.source}</span>`;
        }

        // Action buttons
        const actions = document.createElement('div');
        actions.className = 'row-actions ms-3';

        // Link to config search for this CIDR
        const searchBtn = document.createElement('button');
        searchBtn.className = 'btn-action';
        searchBtn.title = 'Search in Configs';
        searchBtn.innerHTML = '<i class="ph ph-magnifying-glass"></i>';
        searchBtn.onclick = (e) => {
            e.stopPropagation();
            htmx.ajax('GET', '/config-search?q=' + encodeURIComponent(node.cidr), { target: '#main-content', pushUrl: true });
        };

        // Link to IP Lookup for this CIDR
        const lookupBtn = document.createElement('button');
        lookupBtn.className = 'btn-action';
        lookupBtn.title = 'IP Lookup';
        lookupBtn.innerHTML = '<i class="ph ph-map-pin"></i>';
        lookupBtn.onclick = (e) => {
            e.stopPropagation();
            htmx.ajax('GET', '/ip-lookup?q=' + encodeURIComponent(node.cidr), { target: '#main-content', pushUrl: true });
        };

        actions.appendChild(searchBtn);
        actions.appendChild(lookupBtn);
        right.appendChild(actions);

        content.appendChild(left);
        content.appendChild(right);
        item.appendChild(content);

        if (node.children && node.children.length > 0) {
            const subNodes = document.createElement('div');
            const show = node._match ? '' : 'd-none';
            subNodes.className = `sub-nodes ${show}`;

            if (node._match) {
                setTimeout(() => {
                    const icon = item.querySelector('.toggle-icon i');
                    if (icon) icon.className = 'ph ph-caret-down';
                }, 0);
            }

            node.children.forEach(child => {
                subNodes.appendChild(createNodeElement(child, depth + 1));
            });
            item.appendChild(subNodes);
        }

        return item;
    }
</script>

<style>
    .cursor-pointer { cursor: pointer; }
    .hover-bg:hover { background-color: #F8FAFC; }
    .letter-spacing-05 { letter-spacing: 0.05em; }
    .row-actions { opacity: 0; transition: opacity var(--transition); }
    .hover-bg:hover .row-actions { opacity: 1; }
</style>
