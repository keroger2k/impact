<div class="animate-fade-in">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h4 class="mb-0 text-navy fw-bold">Network Hierarchy Engine</h4>
      <p class="text-muted small mb-0">Aggregated visibility across ACI, DNAC, Panorama, and Nexus</p>
    </div>
    <div class="d-flex gap-2">
      <div class="btn-group shadow-sm">
        <button class="btn btn-outline-secondary" onclick="expandAllNodes(true)" title="Expand All"><i class="fas fa-expand-arrows-alt"></i></button>
        <button class="btn btn-outline-secondary" onclick="expandAllNodes(false)" title="Collapse All"><i class="fas fa-compress-arrows-alt"></i></button>
      </div>
      <div class="dropdown">
        <button class="btn btn-outline-navy dropdown-toggle" type="button" data-bs-toggle="dropdown">
          <i class="fas fa-sync-alt me-1"></i> Refresh Discovery
        </button>
        <ul class="dropdown-menu dropdown-menu-end shadow border-0">
          <li><a class="dropdown-item" href="#" onclick="runRefresh()">Refresh All</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item" href="#" onclick="runRefresh('aci')">Refresh ACI Only</a></li>
          <li><a class="dropdown-item" href="#" onclick="runRefresh('dnac')">Refresh DNAC Only</a></li>
          <li><a class="dropdown-item" href="#" onclick="runRefresh('nexus')">Refresh Nexus Only</a></li>
          <li><a class="dropdown-item" href="#" onclick="runRefresh('panorama')">Refresh Panorama Only</a></li>
        </ul>
      </div>
      <a href="/api/ipam/export" class="btn btn-navy">
        <i class="fas fa-file-csv me-1"></i> Export SolarWinds CSV
      </a>
    </div>
  </div>

  <div class="row mb-4">
    <div class="col-md-6">
        <div class="input-group shadow-sm">
            <span class="input-group-text bg-white border-end-0"><i class="fas fa-search text-muted"></i></span>
            <input type="text" id="ipam-filter" class="form-control border-start-0" placeholder="Filter by CIDR, Site, or Device..." onkeyup="filterIPAMTree()">
        </div>
    </div>
  </div>

  <div id="ipam-refresh-overlay" class="d-none">
    <div class="card shadow border-0 mb-4 bg-light bg-opacity-75">
        <div class="card-body">
            <div class="d-flex align-items-center gap-3 mb-3">
                <div class="spinner-border spinner-border-sm text-primary"></div>
                <h6 class="mb-0 fw-bold">Discovery in Progress...</h6>
                <button class="btn btn-sm btn-outline-secondary ms-auto" onclick="closeRefreshOverlay()">Close Log</button>
            </div>
            <div id="ipam-refresh-log" class="bg-dark text-success p-3 rounded small font-monospace" style="height: 150px; overflow-y: auto;">
                <!-- Streaming logs here -->
            </div>
        </div>
    </div>
  </div>

  <div id="ipam-results" hx-get="/api/ipam/tree" hx-trigger="load" hx-target="this">
    <!-- Tree will be rendered here by JS -->
    <div class="text-center my-5 py-5">
        <i class="fas fa-network-wired fa-3x text-light mb-3"></i>
        <p class="text-muted">Loading hierarchical IPAM view...</p>
    </div>
  </div>
</div>

<script>
    function runRefresh(source = null) {
        const overlay = document.getElementById('ipam-refresh-overlay');
        const log = document.getElementById('ipam-refresh-log');
        overlay.classList.remove('d-none');
        log.innerHTML = '';

        let url = '/api/ipam/refresh';
        if (source) url += `?sources=${source}`;

        const eventSource = new EventSource(url);

        eventSource.onmessage = function(event) {
            const data = JSON.parse(event.data);
            const line = document.createElement('div');
            line.className = 'mb-1';
            line.textContent = `> ${data.message}`;
            log.appendChild(line);
            log.scrollTop = log.scrollHeight;

            if (data.type === 'complete') {
                eventSource.close();
                // Trigger HTMX reload of the tree
                htmx.trigger('#ipam-results', 'load');
                setTimeout(() => {
                    const status = document.createElement('div');
                    status.className = 'mt-2 text-info fw-bold';
                    status.textContent = '--- TREE REGENERATED ---';
                    log.appendChild(status);
                    log.scrollTop = log.scrollHeight;
                }, 500);
            }
        };

        eventSource.onerror = function() {
            const err = document.createElement('div');
            err.className = 'text-danger fw-bold mt-1';
            err.textContent = '!! Connection lost or error occurred.';
            log.appendChild(err);
            eventSource.close();
        };
    }

    function closeRefreshOverlay() {
        document.getElementById('ipam-refresh-overlay').classList.add('d-none');
    }

    document.body.addEventListener('htmx:afterOnLoad', function(evt) {
        if (evt.detail.target.id === 'ipam-results') {
            try {
                const data = JSON.parse(evt.detail.xhr.responseText);
                renderIPAMTree(data);
            } catch (e) {
                console.error("Failed to parse IPAM tree data", e);
            }
        }
    });

    let currentIPAMData = null;

    function renderIPAMTree(data) {
        console.log("Rendering IPAM Tree:", data);
        currentIPAMData = data;
        const container = document.getElementById('ipam-results');
        container.innerHTML = '';

        const v4Card = createTreeCard("Global IPv4 Space (RFC1918 & Public)", data.ipv4);
        const v6Card = createTreeCard("Global IPv6 Space (ULA & Public)", data.ipv6);

        container.appendChild(v4Card);
        container.appendChild(v6Card);
    }

    function filterIPAMTree() {
        if (!currentIPAMData) return;
        const query = document.getElementById('ipam-filter').value.toLowerCase();

        // Deep copy data for filtering or just re-render with filter logic
        const filteredData = {
            ipv4: filterNodes(currentIPAMData.ipv4, query),
            ipv6: filterNodes(currentIPAMData.ipv6, query)
        };

        const container = document.getElementById('ipam-results');
        container.innerHTML = '';
        container.appendChild(createTreeCard("Global IPv4 Space (RFC1918 & Public)", filteredData.ipv4));
        container.appendChild(createTreeCard("Global IPv6 Space (ULA & Public)", filteredData.ipv6));
    }

    function filterNodes(nodes, query) {
        if (!query) return nodes;
        return nodes.map(n => {
            const matchSelf = n.cidr.toLowerCase().includes(query) ||
                             n.site.toLowerCase().includes(query) ||
                             n.device.toLowerCase().includes(query) ||
                             n.display_name.toLowerCase().includes(query);

            const filteredChildren = filterNodes(n.children, query);
            if (matchSelf || filteredChildren.length > 0) {
                // If it's a match, we mark it to be expanded by default
                return { ...n, children: filteredChildren, _match: true };
            }
            return null;
        }).filter(n => n !== null);
    }

    function expandAllNodes(expand = true) {
        document.querySelectorAll('.sub-nodes').forEach(el => {
            const item = el.closest('.list-group-item');
            const icon = item.querySelector('.toggle-icon');
            const folder = item.querySelector('.folder-icon');

            if (expand) {
                el.classList.remove('d-none');
                if (icon && icon.tagName === 'I') icon.className = 'fas fa-chevron-down fa-sm toggle-icon text-primary';
                if (folder) folder.className = 'fas fa-folder-open me-2 text-warning folder-icon';
            } else {
                el.classList.add('d-none');
                if (icon && icon.tagName === 'I') icon.className = 'fas fa-chevron-right fa-sm toggle-icon';
                if (folder) folder.className = 'fas fa-folder me-2 text-warning folder-icon';
            }
        });
    }

    function createTreeCard(title, nodes) {
        const card = document.createElement('div');
        card.className = 'card shadow-sm border-0 mb-4';

        const header = document.createElement('div');
        header.className = 'card-header bg-light fw-bold text-navy';
        header.innerHTML = `<i class="fas fa-sitemap me-2"></i>${title}`;
        card.appendChild(header);

        const body = document.createElement('div');
        body.className = 'card-body p-0';

        if (!nodes || nodes.length === 0) {
            body.innerHTML = '<div class="p-4 text-center text-muted">No data discovered in this space.</div>';
        } else {
            const list = document.createElement('div');
            list.className = 'list-group list-group-flush';
            nodes.forEach(node => {
                list.appendChild(createNodeElement(node));
            });
            body.appendChild(list);
        }

        card.appendChild(body);
        return card;
    }

    function createNodeElement(node, depth = 0) {
        const item = document.createElement('div');
        item.className = 'list-group-item border-0 p-0';
        if (depth > 0) item.classList.add('border-start');

        const content = document.createElement('div');
        content.className = 'd-flex align-items-center justify-content-between py-2 px-3 cursor-pointer hover-bg-light border-bottom';
        content.style.paddingLeft = (depth * 1.5 + 1) + 'rem';

        const hasChildren = node.children && node.children.length > 0;

        if (hasChildren) {
            content.title = "Click to expand/collapse";
            content.onclick = (e) => {
                const sub = item.querySelector('.sub-nodes');
                const icon = item.querySelector('.toggle-icon');
                const isCollapsed = sub.classList.contains('d-none');

                if (isCollapsed) {
                    sub.classList.remove('d-none');
                    if (icon && icon.tagName === 'I') icon.className = 'fas fa-chevron-down fa-sm toggle-icon text-primary';
                    const folder = item.querySelector('.folder-icon');
                    if (folder) folder.className = 'fas fa-folder-open me-2 text-warning folder-icon';
                } else {
                    sub.classList.add('d-none');
                    if (icon && icon.tagName === 'I') icon.className = 'fas fa-chevron-right fa-sm toggle-icon';
                    const folder = item.querySelector('.folder-icon');
                    if (folder) folder.className = 'fas fa-folder me-2 text-warning folder-icon';
                }
            };
        }

        // Left side: Icon + Name + CIDR
        const left = document.createElement('div');
        left.className = 'd-flex align-items-center gap-3';

        const toggle = document.createElement('span');
        toggle.className = 'text-muted';
        toggle.style.width = '20px';
        toggle.style.textAlign = 'center';
        if (hasChildren) {
            toggle.innerHTML = '<span class="toggle-icon">▶</span>';
            setTimeout(() => {
                const i = document.createElement('i');
                i.className = 'fas fa-chevron-right fa-sm toggle-icon';
                toggle.innerHTML = '';
                toggle.appendChild(i);
            }, 0);
        }

        const icon = document.createElement('span');
        if (node.type === 'Group' || node.type === 'Supernet') {
            icon.innerHTML = '<i class="fas fa-folder me-2 text-warning folder-icon"></i>';
        } else {
            icon.innerHTML = '<i class="fas fa-network-wired me-2 text-muted" style="font-size: 0.8rem"></i>';
        }

        const info = document.createElement('div');
        info.innerHTML = `
            <div class="fw-bold text-navy">${node.cidr}</div>
            <div class="small text-muted">${node.display_name || 'System Generated'}</div>
        `;

        left.appendChild(toggle);
        left.appendChild(icon);
        left.appendChild(info);

        // Right side: Metadata + Flags
        const right = document.createElement('div');
        right.className = 'd-flex align-items-center gap-2';

        if (node.site !== 'Unknown' && node.site !== '' && node.site !== 'N/A') {
            right.innerHTML += `<span class="badge bg-light text-primary border" title="Site">${node.site}</span>`;
        }

        if (node.device !== 'Unknown' && node.device !== '' && node.device !== 'N/A') {
            right.innerHTML += `<span class="badge bg-light text-secondary border" title="Device">${node.device}</span>`;
        }

        if (node.source !== 'Unknown') {
            right.innerHTML += `<span class="badge bg-navy-light text-navy border-navy" title="Discovery Source">${node.source}</span>`;
        }

        if (node.conflicts.length > 0) {
            right.innerHTML += `<span class="badge bg-danger" title="${node.conflicts.join(', ')}">Conflict</span>`;
        }

        if (node.overlaps.length > 0) {
            right.innerHTML += `<span class="badge bg-warning text-dark" title="${node.overlaps.join(', ')}">Overlap</span>`;
        }

        content.appendChild(left);
        content.appendChild(right);
        item.appendChild(content);

        if (node.children && node.children.length > 0) {
            const subNodes = document.createElement('div');
            // If it was a filter match, expand it
            const show = node._match ? '' : 'd-none';
            subNodes.className = `sub-nodes ${show}`;

            // Sync icon state for pre-expanded nodes
            if (node._match) {
                setTimeout(() => {
                    const icon = item.querySelector('.toggle-icon');
                    if (icon && icon.tagName === 'I') icon.className = 'fas fa-chevron-down fa-sm toggle-icon text-primary';
                    const folder = item.querySelector('.folder-icon');
                    if (folder) folder.className = 'fas fa-folder-open me-2 text-warning folder-icon';
                }, 0);
            }

            node.children.forEach(child => {
                subNodes.appendChild(createNodeElement(child, depth + 1));
            });
            item.appendChild(subNodes);
        }

        return item;
    }
</script>

<style>
    .cursor-pointer { cursor: pointer; }
    .rotate-90 { transform: rotate(90deg); }
    .transition-transform { transition: transform 0.2s; display: inline-block; }
    .bg-navy-light { background-color: rgba(0, 51, 102, 0.05); }
    .border-navy { border: 1px solid rgba(0, 51, 102, 0.2); }
    .hover-bg-light:hover { background-color: rgba(0,0,0,0.02); }
    .toggle-icon { pointer-events: none; }
    .list-group-item.border-start {
        border-left: 1px solid #dee2e6 !important;
        margin-left: 0.85rem;
    }
    .folder-icon { font-size: 1.1rem; }
</style>
