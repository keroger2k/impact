<div class="card shadow-sm border-0 animate-fade-in">
    <div class="card-header bg-light d-flex justify-content-between align-items-center">
        <span class="fw-bold text-navy">📊 Endpoint Groups (EPGs)</span>
        <span class="badge bg-secondary">{{ epgs|length }} EPGs</span>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive sticky-header" style="max-height: calc(100vh - 250px);">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Tenant</th>
                        <th>App Profile</th>
                        <th>EPG Name</th>
                        <th class="text-center">Health</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for e in epgs %}
                    <tr>
                        <td class="fw-bold text-navy">{{ e.tenant }}</td>
                        <td>{{ e.app_prof }}</td>
                        <td>{{ e.name }}</td>
                        <td class="text-center">
                            {% set h = e.health|int %}
                            <div class="d-flex align-items-center justify-content-center gap-2">
                                <div class="progress w-100" style="height: 6px; max-width: 60px;">
                                    <div class="progress-bar {% if h >= 90 %}bg-success{% elif h >= 70 %}bg-warning{% else %}bg-danger{% endif %}"
                                         role="progressbar" style="width: {{ h }}%"></div>
                                </div>
                                <span class="fw-bold {% if h >= 90 %}text-success{% elif h >= 70 %}text-warning{% else %}text-danger{% endif %} small">
                                    {{ h }}%
                                </span>
                            </div>
                        </td>
                        <td>
                            <button class="btn btn-outline-primary btn-sm" hx-get="/api/aci/traffic/epg-health?dn={{ e.dn }}" hx-target="#aci-results">
                                <i class="fas fa-chart-line"></i> Stats
                            </button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
