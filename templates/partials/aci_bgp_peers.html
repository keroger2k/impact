<div class="card shadow-sm border-0 animate-fade-in">
    <div class="card-header bg-light d-flex justify-content-between align-items-center">
        <div>
            <button class="btn btn-sm btn-outline-secondary me-2" hx-get="/api/aci/bgp/peers" hx-target="#aci-results">
                <i class="fas fa-arrow-left"></i>
            </button>
            <span class="fw-bold text-navy">🔌 BGP Peers</span>
        </div>
        <span class="badge bg-secondary">{{ peers|length }} Peers</span>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive sticky-header" style="max-height: calc(100vh - 250px);">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Node</th>
                        <th>L3Out</th>
                        <th>Neighbor IP</th>
                        <th>State</th>
                        <th>Advertised Networks</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for p in peers %}
                    <tr>
                        <td>{{ p.node }}</td>
                        <td class="small">{{ p.l3out }}</td>
                        <td class="fw-bold">{{ p.addr }}</td>
                        <td>
                            <span class="badge {% if p.state == 'ESTABLISHED' %}bg-success{% else %}bg-danger{% endif %}">
                                {{ p.state }}
                            </span>
                        </td>
                        <td class="small">
                            {% for net in p.nets %}
                                <div class="text-nowrap">{{ net }}</div>
                            {% endfor %}
                        </td>
                        <td>
                            <button class="btn btn-outline-primary btn-sm" hx-get="/api/aci/bgp/routes/{{ p.node }}" hx-target="#aci-results">
                                View Node Routes
                            </button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
