<div class="card shadow-sm border-0 animate-fade-in">
  <div class="card-header bg-navy text-white d-flex justify-content-between align-items-center">
    <span class="fw-bold">Network Access Devices ({{ total }})</span>
    <div class="d-flex gap-2">
       <input type="text" class="form-control form-control-sm bg-white border-0" placeholder="Filter..." hx-get="/api/ise/nads" hx-trigger="keyup changed delay:500ms" name="search" hx-target="#ise-results">
       <button class="btn btn-sm btn-outline-light px-2" hx-get="/api/ise/nads" hx-target="#ise-results" hx-indicator="#ise-loading"><i class=" ph ph-arrows-clockwise"></i></button>
    </div>
  </div>
  <div class="card-body p-0 overflow-auto" style="max-height: calc(100vh - 200px);">
    <table class="table table-hover table-striped mb-0 data-table">
      <thead class="bg-light sticky-top">
        <tr>
          <th>Name</th>
          <th>IP Address</th>
          <th>Model</th>
          <th>Software</th>
          <th>Profile</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        {% for item in items %}
        <tr>
          <td class="fw-bold text-navy">{{ item.name }}</td>
          <td class="mono">{{ item.ip_address }}</td>
          <td>{{ item.model }}</td>
          <td class="small">{{ item.software_version }}</td>
          <td><span class="badge bg-light text-muted">{{ item.profile }}</span></td>
          <td><span class="status-dot ok" aria-label="Online"></span> Active</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
