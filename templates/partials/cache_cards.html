<div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
    {% for card in cards %}
    <div class="col">
        <div class="card h-100 shadow-sm border-start border-4 border-{{ card.color }}">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start mb-3">
                    <div>
                        <h6 class="card-subtitle mb-1 text-muted text-uppercase small font-weight-bold">{{ card.title }}</h6>
                        <h3 class="card-title mb-0">
                            {{ card.count }} <small class="text-muted fs-6">items</small>
                        </h3>
                    </div>
                    <div class="bg-{{ card.color }} bg-opacity-10 p-3 rounded text-{{ card.color }}">
                        <i class="{{ card.icon }} fa-2x"></i>
                    </div>
                </div>

                <div class="mt-auto">
                    <p class="card-text mb-3 small">
                        <i class="fas fa-clock me-1 text-muted"></i>
                        Last updated: <span class="fw-bold">{{ card.set_at }}</span>
                    </p>

                    <button class="btn btn-sm btn-outline-{{ card.color }} w-100"
                            {% if card.sse %}
                            onclick="triggerNexusCacheRefresh()"
                            {% else %}
                            hx-post="/api/cache/refresh/{{ card.key }}"
                            hx-target="#cache-results"
                            hx-indicator="#cache-spinner"
                            hx-on::after-request="if(event.detail.successful) htmx.ajax('GET', '/api/cache/status', {target: '#cache-cards-container', swap: 'innerHTML'})"
                            {% endif %}>
                        <i class="fas fa-sync-alt me-1"></i> Refresh {{ card.title }}
                    </button>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
