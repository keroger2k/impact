<div class="card shadow-sm border-0 animate-fade-in mt-3">
  <div class="card-header bg-navy text-white d-flex justify-content-between align-items-center">
    <span class="fw-bold">User Details: {{ u.name }}</span>
    <button class="btn btn-sm btn-outline-light" hx-get="/api/ise/users" hx-target="#ise-results">Back to List</button>
  </div>
  <div class="card-body">
    <div class="row">
      <div class="col-md-6">
        <div class="detail-section mb-3">
          <div class="detail-section-title">Identity Information</div>
          <div class="kv-row"><span class="kv-label">Username</span><span class="kv-value">{{ u.name }}</span></div>
          <div class="kv-row"><span class="kv-label">ID</span><span class="kv-value small mono">{{ u.id }}</span></div>
          <div class="kv-row"><span class="kv-label">Description</span><span class="kv-value">{{ u.description or '—' }}</span></div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="detail-section mb-3">
          <div class="detail-section-title">Status & Security</div>
          <div class="kv-row"><span class="kv-label">Enabled</span><span class="kv-value">
            <span class="badge {% if u.enabled %}bg-success{% else %}bg-secondary{% endif %}">
              {{ 'Yes' if u.enabled else 'No' }}
            </span>
          </span></div>
          <div class="kv-row"><span class="kv-label">Password Policy</span><span class="kv-value">{{ u.passwordPolicy or 'Default' }}</span></div>
        </div>
      </div>
    </div>
  </div>
</div>
