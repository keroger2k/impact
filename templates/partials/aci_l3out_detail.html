<div class="card shadow-sm border-0 animate-fade-in">
    <div class="card-header bg-light d-flex justify-content-between align-items-center">
        <div>
            <button class="btn btn-sm btn-outline-secondary me-2" hx-get="/api/aci/l3outs" hx-target="#aci-results">
                <i class="fas fa-arrow-left"></i>
            </button>
            <span class="fw-bold text-navy">L3Out Detail</span>
        </div>
    </div>
    <div class="card-body">
        <pre class="bg-dark text-light p-3 rounded shadow-inner" style="max-height: 500px; overflow-y: auto;">
{{ detail | tojson(indent=2) }}
        </pre>
    </div>
</div>
