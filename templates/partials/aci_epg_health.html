<div class="card shadow-sm border-0 animate-fade-in">
    <div class="card-header bg-light d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <button class="btn btn-sm btn-outline-secondary me-3" hx-get="/api/aci/traffic/epgs" hx-target="#aci-results" hx-indicator="#aci-loading">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="d-flex align-items-center gap-3">
                <span class="fw-bold text-navy">EPG Health: {{ e.dn.split('/')[-1] }}</span>
                <button class="btn btn-xs btn-outline-navy" onclick='showRawData({{ raw_json|tojson }})'>
                    <i class="fas fa-code me-1"></i>Raw
                </button>
            </div>
        </div>
    </div>
    <div class="card-body">
        <div class="row align-items-center">
            <div class="col-md-4 text-center">
                <div class="display-4 fw-bold {% if e.health|int >= 90 %}text-success{% elif e.health|int >= 70 %}text-warning{% else %}text-danger{% endif %}">
                    {{ e.health }}
                </div>
                <div class="text-muted uppercase small letter-spacing-1">Health Score</div>
            </div>
            <div class="col-md-8">
                <div class="progress mb-2" style="height: 10px;">
                    <div class="progress-bar {% if e.health|int >= 90 %}bg-success{% elif e.health|int >= 70 %}bg-warning{% else %}bg-danger{% endif %}"
                         role="progressbar" style="width: {{ e.health }}%"></div>
                </div>
                <p class="small text-muted">
                    This score reflects the real-time operational status and fault count for this Endpoint Group across the fabric.
                </p>
            </div>
        </div>
        <div class="mt-4 border-top pt-3">
            <h6 class="text-navy fw-bold small uppercase mb-3">Resource Location</h6>
            <div class="mono small p-2 bg-light rounded">{{ e.dn }}</div>
        </div>
    </div>
</div>
