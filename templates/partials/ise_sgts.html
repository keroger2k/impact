<div class="card shadow-sm border-0 animate-fade-in">
  <div class="card-header bg-navy text-white d-flex justify-content-between align-items-center">
    <span class="fw-bold">Scalable Group Tags ({{ total }})</span>
    <button class="btn btn-sm btn-outline-light px-2" hx-get="/api/ise/sgts" hx-target="#ise-results" hx-indicator="#ise-loading"><i class="fas fa-sync"></i></button>
  </div>
  <div class="card-body p-0 overflow-auto" style="max-height: calc(100vh - 200px);">
    <table class="table table-hover table-striped mb-0">
      <thead class="bg-light sticky-top">
        <tr>
          <th>Name</th>
          <th>Value (SGT)</th>
          <th>Description</th>
          <th>Propagate to APIC</th>
        </tr>
      </thead>
      <tbody>
        {% for item in items %}
        <tr>
          <td class="fw-bold text-navy">{{ item.name }}</td>
          <td><span class="badge bg-primary-subtle text-primary">{{ item.value }}</span></td>
          <td class="small text-muted">{{ item.description }}</td>
          <td>
            {% if item.propagateToApic %}
            <span class="text-success"><i class="fas fa-check-circle"></i> Yes</span>
            {% else %}
            <span class="text-muted"><i class="fas fa-times-circle"></i> No</span>
            {% endif %}
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
