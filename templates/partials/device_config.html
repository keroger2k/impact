<div class="animate-fade-in mt-3">
  <div class="d-flex justify-content-between align-items-center mb-2">
    <h6 class="text-uppercase text-muted fw-bold small mb-0">Running Configuration</h6>
    {% if cached %}
      <span class="badge bg-warning-subtle text-warning small px-2">Cached</span>
    {% endif %}
  </div>
  <pre class="code-block bg-dark text-success p-3 rounded" style="max-height: 500px; overflow: auto; font-family: 'SF Mono', monospace; font-size: 11px; border: 1px solid #333;">{{ config }}</pre>
</div>
