<div class="card shadow-sm border-0 animate-fade-in">
    <div class="card-header bg-light d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <button class="btn btn-sm btn-outline-secondary me-3" hx-get="/api/aci/fabric/nodes" hx-target="#aci-results" hx-indicator="#aci-loading">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="d-flex align-items-center gap-3">
                <span class="fw-bold text-navy">Routing Table: Node {{ node_id }}</span>
                <button class="btn btn-xs btn-outline-navy" onclick='showRawData({{ raw_json|tojson }})'>
                    <i class="fas fa-code me-1"></i>Raw
                </button>
            </div>
        </div>
        <span class="badge bg-secondary">{{ routes|length }} Routes</span>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive sticky-header" style="max-height: calc(100vh - 250px);">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>VRF</th>
                        <th>Prefix</th>
                        <th>Next Hop</th>
                        <th>Origin</th>
                        <th>AS Path</th>
                    </tr>
                </thead>
                <tbody>
                    {% for r in routes %}
                    <tr>
                        <td><span class="badge bg-secondary">{{ r.vrf }}</span></td>
                        <td class="fw-bold text-navy">{{ r.prefix }}</td>
                        <td class="mono small">{{ r.nextHop }}</td>
                        <td><span class="badge bg-light text-navy">{{ r.origin }}</span></td>
                        <td class="small">{{ r.asPath or '—' }}</td>
                    </tr>
                    {% endfor %}
                    {% if not routes %}
                    <tr>
                        <td colspan="4" class="text-center p-4 text-muted small">No BGP routes found for this node.</td>
                    </tr>
                    {% endif %}
                </tbody>
            </table>
        </div>
    </div>
</div>
