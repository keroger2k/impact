<div class="card shadow-sm border-0 animate-fade-in">
    <div class="card-header bg-light d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-3">
            <span class="fw-bold text-navy">🏢 Fabric Nodes</span>
            <button class="btn btn-xs btn-outline-navy" onclick='showRawData({{ raw_json|tojson }})'>
                <i class="fas fa-code me-1"></i>Raw
            </button>
        </div>
        <span class="badge bg-secondary">{{ nodes|length }} Nodes</span>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive sticky-header" style="max-height: calc(100vh - 250px);">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Model</th>
                        <th>Status</th>
                        <th>BGP Routes</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for n in nodes %}
                    <tr>
                        <td class="fw-bold text-navy">{{ n.id }}</td>
                        <td>{{ n.name }}</td>
                        <td>
                            <span class="badge {% if n.role == 'spine' %}bg-primary{% elif n.role == 'leaf' %}bg-info{% else %}bg-secondary{% endif %}">
                                {{ n.role|upper }}
                            </span>
                        </td>
                        <td class="small">{{ n.model }}</td>
                        <td>
                            <span class="badge {% if n.status == 'active' %}bg-success{% else %}bg-warning{% endif %}">
                                {{ n.status }}
                            </span>
                        </td>
                        <td>
                            {% if n.route_count > 0 %}
                            <span class="badge bg-navy">{{ n.route_count }}</span>
                            {% else %}
                            <span class="text-muted small">0</span>
                            {% endif %}
                        </td>
                        <td>
                            <button class="btn btn-outline-primary btn-sm" hx-get="/api/aci/bgp/routes/{{ n.id }}" hx-target="#aci-results" hx-indicator="#aci-loading">
                                View Routes
                            </button>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
