<div class="card shadow-sm border-0 animate-fade-in">
  <div class="card-header bg-navy text-white d-flex justify-content-between align-items-center">
    <span class="fw-bold">Internal Users ({{ total }})</span>
    <div class="d-flex gap-2">
       <input type="text" class="form-control form-control-sm bg-white border-0" placeholder="Filter..." hx-get="/api/ise/users" hx-trigger="keyup changed delay:500ms" name="search" hx-target="#ise-results">
       <button class="btn btn-sm btn-outline-light px-2" hx-get="/api/ise/users" hx-target="#ise-results" hx-indicator="#ise-loading"><i class="fas fa-sync"></i></button>
    </div>
  </div>
  <div class="card-body p-0 overflow-auto" style="max-height: calc(100vh - 200px);">
    <table class="table table-hover table-striped mb-0">
      <thead class="bg-light sticky-top">
        <tr>
          <th>Username</th>
          <th>Description</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for item in items %}
        <tr>
          <td class="fw-bold text-navy">{{ item.name }}</td>
          <td class="small text-muted">{{ item.description or '—' }}</td>
          <td><span class="status-dot ok"></span> Active</td>
          <td>
            <button class="btn btn-xs btn-outline-primary" hx-get="/api/ise/users/{{ item.id }}" hx-target="#ise-results" hx-indicator="#ise-loading">Details</button>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
