<div class="card shadow-sm border-0 animate-fade-in">
  <div class="card-header bg-navy text-white d-flex justify-content-between align-items-center">
    <span class="fw-bold">Firewall Device Groups</span>
  </div>
  <div class="card-body p-0">
    <table class="table table-hover table-striped mb-0 data-table">
      <thead class="bg-light">
        <tr>
          <th>Group Name</th>
          <th>Type</th>
          <th data-no-sort data-no-filter>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for dg in items %}
        <tr>
          <td class="fw-bold text-navy">{{ dg }}</td>
          <td><span class="badge bg-info-subtle text-info">Panorama DG</span></td>
          <td>
             <button class="btn btn-xs btn-outline-primary px-2 py-0"
                     hx-get="/api/firewall/policies/{{ dg }}"
                     hx-target="#pan-results"
                     hx-indicator="#pan-loading">
               Explore
             </button>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
